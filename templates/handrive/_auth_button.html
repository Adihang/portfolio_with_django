{% if not user.is_authenticated %}
<a class="handrive-btn" href="{{ docs_login_url }}?next={{ docs_auth_next|urlencode }}">{{ docs_text.auth_login_button }}</a>
<a class="handrive-btn handrive-btn-primary" href="{{ docs_signup_url }}?next={{ docs_auth_next|urlencode }}">{{ docs_text.auth_signup_button }}</a>
{% endif %}
