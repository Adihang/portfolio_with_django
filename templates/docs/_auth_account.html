{% if user.is_authenticated %}
<div class="ide-auth-account-floating" data-ide-auth-account>
    <button
        type="button"
        class="ide-auth-account-trigger"
        data-ide-account-trigger
        aria-haspopup="menu"
        aria-expanded="false"
    >
        <span class="ide-auth-account-avatar" aria-hidden="true"></span>
        <span class="ide-auth-account-name">{{ user.get_username }}</span>
    </button>
    <div class="ide-auth-account-menu" data-ide-auth-account-menu hidden>
        <a class="ide-auth-account-menu-item" href="{{ docs_my_portfolio_url }}">
            {{ docs_text.auth_my_portfolio_button }}
        </a>
        <button
            type="button"
            class="ide-auth-account-menu-item"
            data-ide-account-logout
            data-confirm-message="{{ docs_text.auth_logout_confirm }}"
        >
            {{ docs_text.auth_logout_button }}
        </button>
    </div>
    <form method="post" action="{{ docs_logout_url }}" class="ide-auth-form ide-auth-form-hidden" id="ide-auth-logout-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ docs_logout_next|default:docs_base_url }}">
    </form>
</div>
{% endif %}
