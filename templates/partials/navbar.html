<!-- 네비게이션바 -->
<nav class="navbar ui-nav">
    <div class="container-fluid">
        <div class="ui-brand-group">
            <a class="navbar-brand ui-brand" href="/">
                <span class="ui-brand-text">Hanplanet{% if debug %}<sup>D</sup>{% endif %}</span>
            </a>
        </div>
        {% if not navbar_supported_content_empty %}
        <button class="navbar-toggler ui-nav-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        {% endif %}
        <div class="collapse ui-nav-collapse" id="navbarSupportedContent">
            {% if not navbar_supported_content_empty %}
            <ul class="ui-nav-links">
                {% for nav_link in nav_links %}
                    <li class="nav-item">
                        <a class="nav-link ui-nav-link" href="{{ nav_link.url }}">{{ nav_link.name }}</a>
                    </li>
                {% endfor %}
            </ul>
            <button
                type="button"
                class="ui-pwa-install-btn"
                data-pwa-install
                aria-label="{% include 'partials/ui_i18n.html' with key='install_app' %}"
                title="{% include 'partials/ui_i18n.html' with key='install_app' %}"
            >
                <span class="ui-pwa-install-icon" aria-hidden="true"></span>
            </button>
            <div class="ui-controls-stack">
                <div class="ui-lang-toggle ui-control-toggle ui-lang-toggle-inline" aria-label="Language Toggle">
                    <a class="ui-lang-link ui-control-link{% if ui_lang|default:'ko' == 'ko' %} is-active{% endif %}" href="{{ lang_switch_ko_url }}">KO</a>
                    <span class="ui-lang-divider">|</span>
                    <a class="ui-lang-link ui-control-link{% if ui_lang|default:'ko' == 'en' %} is-active{% endif %}" href="{{ lang_switch_en_url }}">EN</a>
                </div>
                <div class="ui-lang-toggle ui-control-toggle ui-theme-toggle" aria-label="Theme Toggle">
                    <a href="#" role="button" class="ui-lang-link ui-control-link is-active" data-theme-mode="light">LT</a>
                    <span class="ui-lang-divider">|</span>
                    <a href="#" role="button" class="ui-lang-link ui-control-link" data-theme-mode="dark">DK</a>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</nav>
