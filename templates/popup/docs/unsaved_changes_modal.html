<div id="ide-unsaved-modal" class="ide-rename-modal" hidden>
    <div class="ide-rename-modal-backdrop" id="ide-unsaved-modal-backdrop"></div>
    <div class="ide-rename-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="ide-unsaved-title" aria-describedby="ide-unsaved-message">
        <h3 id="ide-unsaved-title" class="ide-rename-title">{{ docs_text.unsaved_changes_title }}</h3>
        <p id="ide-unsaved-message" class="ide-auth-logout-message">{{ docs_text.unsaved_changes_message }}</p>
        <div class="ide-rename-actions">
            <button type="button" class="ide-btn" id="ide-unsaved-cancel-btn">{{ docs_text.cancel }}</button>
            <button type="button" class="ide-btn" id="ide-unsaved-leave-btn">{{ docs_text.unsaved_changes_leave_button }}</button>
            <button type="button" class="ide-btn ide-btn-primary" id="ide-unsaved-save-btn">{{ docs_text.unsaved_changes_save_button }}</button>
        </div>
    </div>
</div>
