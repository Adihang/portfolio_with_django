<div id="ide-url-share-modal" class="ide-rename-modal" hidden>
    <div class="ide-rename-modal-backdrop" id="ide-url-share-modal-backdrop"></div>
    <div class="ide-rename-modal-dialog" data-popup-fit-bottom role="dialog" aria-modal="true" aria-labelledby="ide-url-share-title">
        <h3 id="ide-url-share-title" class="ide-rename-title">{{ docs_text.url_share_title }}</h3>
        <label class="ide-field ide-field-full">
            <span>{{ docs_text.url_share_label }}</span>
            <input type="text" id="ide-url-share-input" readonly>
        </label>
        <div class="ide-rename-actions">
            <button type="button" class="ide-btn" id="ide-url-share-close-btn">{{ docs_text.cancel }}</button>
            <button type="button" class="ide-btn ide-btn-primary" id="ide-url-share-copy-btn">{{ docs_text.url_share_copy_button }}</button>
        </div>
    </div>
</div>
