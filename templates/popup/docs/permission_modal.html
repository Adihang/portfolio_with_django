<div id="ide-permission-modal" class="ide-rename-modal" hidden>
    <div class="ide-rename-modal-backdrop" id="ide-permission-modal-backdrop"></div>
    <div class="ide-rename-modal-dialog ide-permission-modal-dialog" data-popup-fit-bottom role="dialog" aria-modal="true" aria-labelledby="ide-permission-title">
        <h3 id="ide-permission-title" class="ide-rename-title">{{ docs_text.permission_title }}</h3>
        <div class="ide-rename-target" id="ide-permission-target"></div>
        <div class="ide-permission-grid">
            <div class="ide-permission-col">
                <div class="ide-permission-col-title">{{ docs_text.permission_read_users }}</div>
                <div class="ide-permission-list" id="ide-permission-read-users-list"></div>
            </div>
            <div class="ide-permission-col">
                <div class="ide-permission-col-title">{{ docs_text.permission_read_groups }}</div>
                <div class="ide-permission-list" id="ide-permission-read-groups-list"></div>
            </div>
            <div class="ide-permission-col">
                <div class="ide-permission-col-title">{{ docs_text.permission_write_users }}</div>
                <div class="ide-permission-list" id="ide-permission-write-users-list"></div>
            </div>
            <div class="ide-permission-col">
                <div class="ide-permission-col-title">{{ docs_text.permission_write_groups }}</div>
                <div class="ide-permission-list" id="ide-permission-write-groups-list"></div>
            </div>
        </div>
        <div class="ide-permission-help">{{ docs_text.permission_help }}</div>
        <div class="ide-rename-actions">
            <button type="button" class="ide-btn" id="ide-permission-cancel-btn">{{ docs_text.cancel }}</button>
            <button type="button" class="ide-btn ide-btn-primary" id="ide-permission-save-btn">{{ docs_text.permission_save_button }}</button>
        </div>
    </div>
</div>
