<div id="ide-folder-modal" class="ide-folder-modal" hidden>
    <div class="ide-folder-modal-backdrop" id="ide-folder-modal-backdrop"></div>
    <div class="ide-folder-modal-dialog" data-popup-fit-bottom role="dialog" aria-modal="true" aria-labelledby="ide-folder-modal-title">
        <h3 id="ide-folder-modal-title" class="ide-folder-modal-title">{{ docs_text.folder_modal_title }}</h3>
        <div class="ide-folder-modal-path" id="ide-folder-target-path">/ide</div>
        <label class="ide-field ide-field-full">
            <span>{{ docs_text.folder_name_label }}</span>
            <input type="text" id="ide-folder-name-input" placeholder="{{ docs_text.folder_name_placeholder }}">
        </label>
        <div class="ide-folder-modal-actions">
            <button type="button" class="ide-btn" id="ide-folder-cancel-btn">{{ docs_text.cancel }}</button>
            <button type="button" class="ide-btn ide-btn-primary" id="ide-folder-create-btn">{{ docs_text.create_button }}</button>
        </div>
    </div>
</div>
