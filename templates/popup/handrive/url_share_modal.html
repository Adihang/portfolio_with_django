<div id="handrive-url-share-modal" class="handrive-rename-modal" hidden>
    <div class="handrive-rename-modal-backdrop" id="handrive-url-share-modal-backdrop"></div>
    <div class="handrive-rename-modal-dialog" data-popup-fit-bottom role="dialog" aria-modal="true" aria-labelledby="handrive-url-share-title">
        <h3 id="handrive-url-share-title" class="handrive-rename-title">{{ docs_text.url_share_title }}</h3>
        <label class="handrive-field handrive-field-full">
            <span>{{ docs_text.url_share_label }}</span>
            <input type="text" id="handrive-url-share-input" readonly>
        </label>
        <div class="handrive-rename-actions">
            <button type="button" class="handrive-btn" id="handrive-url-share-close-btn">{{ docs_text.cancel }}</button>
            <button type="button" class="handrive-btn handrive-btn-primary" id="handrive-url-share-copy-btn">{{ docs_text.url_share_copy_button }}</button>
        </div>
    </div>
</div>
