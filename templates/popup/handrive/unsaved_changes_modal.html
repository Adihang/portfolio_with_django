<div id="handrive-unsaved-modal" class="handrive-rename-modal" hidden>
    <div class="handrive-rename-modal-backdrop" id="handrive-unsaved-modal-backdrop"></div>
    <div class="handrive-rename-modal-dialog" data-popup-fit-bottom role="dialog" aria-modal="true" aria-labelledby="handrive-unsaved-title" aria-describedby="handrive-unsaved-message">
        <h3 id="handrive-unsaved-title" class="handrive-rename-title">{{ docs_text.unsaved_changes_title }}</h3>
        <p id="handrive-unsaved-message" class="handrive-auth-logout-message">{{ docs_text.unsaved_changes_message }}</p>
        <div class="handrive-rename-actions">
            <button type="button" class="handrive-btn" id="handrive-unsaved-cancel-btn">{{ docs_text.cancel }}</button>
            <button type="button" class="handrive-btn" id="handrive-unsaved-leave-btn">{{ docs_text.unsaved_changes_leave_button }}</button>
            <button type="button" class="handrive-btn handrive-btn-primary" id="handrive-unsaved-save-btn">{{ docs_text.unsaved_changes_save_button }}</button>
        </div>
    </div>
</div>
