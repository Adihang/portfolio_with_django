<aside class="handrive-job-queue-panel" id="handrive-job-queue-panel" aria-live="polite" hidden>
    <header class="handrive-job-queue-head">
        <div class="handrive-job-queue-head-main">
            <h3 class="handrive-job-queue-title" id="handrive-job-queue-title">{{ docs_text.job_queue_title }}</h3>
            <span class="handrive-job-queue-summary" id="handrive-job-queue-summary">{{ docs_text.job_queue_empty }}</span>
        </div>
        <button class="handrive-job-queue-close" id="handrive-job-queue-close" type="button" aria-label="{{ docs_text.cancel }}" title="{{ docs_text.cancel }}">×</button>
    </header>
    <ul class="handrive-job-queue-list" id="handrive-job-queue-list"></ul>
</aside>
