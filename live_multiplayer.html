        (function () {
            const path = window.location.pathname;
            const explicitLightPaths = new Set(['/portfolio/', '/portfolio', '/docs/', '/docs']);
            const localizedLightBgPattern = /^\/(?:ko|en)\/(?:portfolio\/?|project\/\d+\/?|docs(?:\/.*)?)$/;
            const shouldUseLightBg = explicitLightPaths.has(path) ||
                path.startsWith('/docs/') ||
                path.startsWith('/project/') ||
                localizedLightBgPattern.test(path);

            if (!shouldUseLightBg) {
                return;
            }

            const accountThemeMode = (document.documentElement.getAttribute('data-account-theme-mode') || '').trim().toLowerCase();
            let prefersDark = false;

            if (accountThemeMode === 'dark') {
                prefersDark = true;
            } else if (accountThemeMode === 'light') {
                prefersDark = false;
            } else {
                try {
                    const storedThemeMode = window.localStorage.getItem('portfolio_theme_mode');
                    if (storedThemeMode === 'dark') {
                        prefersDark = true;
                    } else if (storedThemeMode === 'light') {
                        prefersDark = false;
                    } else {
                        prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                    }
                } catch (error) {
                    prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                }
            }

            if (prefersDark) {
                document.documentElement.classList.add('preload-dark-bg');
            } else {
                document.documentElement.classList.add('preload-light-bg');
            }

<script>
    (function () {
        const loginForm = document.getElementById("ide-login-form");
        const submitButton = document.getElementById("ide-login-submit-btn");
        if (!loginForm || !submitButton) {
            return;
        }

        const handleEnterSubmit = function (event) {
            if (event.key !== "Enter" || event.isComposing) {
                return;
            }
            event.preventDefault();
            if (typeof loginForm.requestSubmit === "function") {
                loginForm.requestSubmit(submitButton);
                return;
            }
            submitButton.click();
        };

        loginForm.querySelectorAll('input[name="username"], input[name="password"]').forEach(function (input) {
            input.addEventListener("keydown", handleEnterSubmit);
        });

        const usernameInput = loginForm.querySelector('input[name="username"]');
        const captchaBlock = document.getElementById("ide-login-captcha-block");
        const captchaQuestionNode = document.getElementById("ide-login-captcha-question");
        const captchaAnswerInput = loginForm.querySelector('input[name="ide-captcha-answer"]');
        const turnstileContainer = document.getElementById("ide-turnstile-widget");
        const captchaStatusUrl = "/ide/api/login\u002Dcaptcha\u002Dstatus";
        const turnstileSiteKey = "0x4AAAAAACktHZCxqjisAyeX";

        const getTurnstileTheme = function () {
            return document.body.classList.contains("theme-dark") ? "dark" : "light";
        };

        let lastTheme = "";
        let turnstileWidgetId = null;
        let mutationObserver = null;
        let usernameCheckTimer = null;
        let lastCheckedUsername = "";

        const removeTurnstile = function () {
            if (!window.turnstile || turnstileWidgetId === null) {
                if (turnstileContainer) {
                    turnstileContainer.innerHTML = "";
                }
                return;
            }
            try {
                window.turnstile.remove(turnstileWidgetId);
            } catch (error) {
                turnstileContainer.innerHTML = "";
            }
            turnstileWidgetId = null;
        };

        const renderTurnstile = function () {
            if (!window.turnstile || !turnstileContainer || !turnstileSiteKey) {
                return;
            }
            const nextTheme = getTurnstileTheme();
            if (
                lastTheme === nextTheme &&
                turnstileWidgetId !== null &&
                turnstileContainer.childElementCount > 0
            ) {
                return;
            }
            removeTurnstile();
            turnstileWidgetId = window.turnstile.render("#ide-turnstile-widget", {
                sitekey: turnstileSiteKey,
                theme: nextTheme
            });
            lastTheme = nextTheme;
        };

        const setCaptchaVisible = function (visible, questionText) {
            if (!captchaBlock) {
                return;
            }
            if (visible) {
                captchaBlock.removeAttribute("hidden");
            } else {
                captchaBlock.setAttribute("hidden", "");
            }
            if (captchaQuestionNode) {
                captchaQuestionNode.textContent = visible ? (questionText || "") : "";
            }
            if (captchaAnswerInput) {
                captchaAnswerInput.required = Boolean(visible);
                if (!visible) {
                    captchaAnswerInput.value = "";
                }
            }
            if (visible) {
                renderTurnstile();
                return;
            }
            removeTurnstile();
            lastTheme = "";
        };

        const fetchCaptchaStatus = function (force) {
            if (!usernameInput || !captchaStatusUrl) {
                return;
            }
            const usernameValue = usernameInput.value.trim();
            if (!usernameValue) {
                lastCheckedUsername = "";
                setCaptchaVisible(false, "");
                return;
            }
            if (!force && usernameValue === lastCheckedUsername) {
                return;
            }
            lastCheckedUsername = usernameValue;

            fetch(captchaStatusUrl + "?username=" + encodeURIComponent(usernameValue), {
                method: "GET",
                credentials: "same-origin",
                headers: {
                    "Accept": "application/json"
                }
            })
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error("captcha status request failed");
                    }
                    return response.json();
                })
                .then(function (data) {
                    if (!data || data.ok !== true) {
                        return;
                    }
                    if (data.required) {
                        setCaptchaVisible(true, data.question || "");
                        return;
                    }
                    setCaptchaVisible(false, "");
                })
                .catch(function () {
                    return;
                });
        };

        window.ideTurnstileOnload = function () {
            if (captchaBlock && !captchaBlock.hasAttribute("hidden")) {
                renderTurnstile();
            }
            if (mutationObserver) {
                mutationObserver.disconnect();
            }
            mutationObserver = new MutationObserver(function (mutations) {
                for (const mutation of mutations) {
                    if (mutation.attributeName === "class") {
                        if (captchaBlock && !captchaBlock.hasAttribute("hidden")) {
                            renderTurnstile();
                        }
                        break;
                    }
                }
            });
            mutationObserver.observe(document.body, {
                attributes: true,
                attributeFilter: ["class"]
            });
        };

        if (window.turnstile && typeof window.turnstile.render === "function") {
            window.ideTurnstileOnload();
        }

        if (usernameInput) {
            usernameInput.addEventListener("blur", function () {
                fetchCaptchaStatus(true);
            });
            usernameInput.addEventListener("input", function () {
                if (usernameCheckTimer) {
                    window.clearTimeout(usernameCheckTimer);
                }
                usernameCheckTimer = window.setTimeout(function () {
                    fetchCaptchaStatus(false);
                }, 300);
            });
            fetchCaptchaStatus(true);
        }
    })();
</script>
