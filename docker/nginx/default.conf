map $http_x_forwarded_proto $upstream_x_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_cf_connecting_ip $client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

log_format access_json escape=json '{'
    '"logged_at":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"client_ip":"$client_ip",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"method":"$request_method",'
    '"path":"$uri",'
    '"query":"$args",'
    '"status":$status,'
    '"request_time_s":$request_time,'
    '"upstream_time_s":"$upstream_response_time",'
    '"bytes_sent":$body_bytes_sent,'
    '"host":"$host",'
    '"scheme":"$scheme",'
    '"user_agent":"$http_user_agent",'
    '"referer":"$http_referer"'
'}';

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    access_log /var/log/nginx/access_json.log access_json;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, s-maxage=2592000, immutable";
    }

    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://django:8000;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_x_forwarded_proto;
    }
}
