services:
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-django
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DJANGO_SERVE_FILES: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/portfolio/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    depends_on:
      django:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/portfolio/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: portfolio-cloudflared
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./docker/cloudflared:/etc/cloudflared:ro

volumes:
  staticfiles_data:
  media_data:
